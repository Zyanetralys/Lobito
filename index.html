<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-9 PIXEL // ZYANETRALYS</title>
<style>
:root{--hud:#00ff88;--warn:#ffaa00;--alert:#ff3344;--bg:#05080a;--panel:rgba(0,15,8,0.85)}
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
body{background:var(--bg);color:var(--hud);font-family:'Courier New',monospace;overflow:hidden;height:100vh}
.grid{position:fixed;inset:0;background:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
.scanline{position:fixed;inset:0;background:linear-gradient(180deg,transparent 95%,rgba(0,255,136,0.015) 100%);pointer-events:none;animation:scan 10s linear infinite;z-index:1}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
canvas{position:fixed;top:0;left:0;z-index:5;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:fixed;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;pointer-events:none}
.panel{background:var(--panel);border:1px solid var(--hud);padding:10px 14px;border-radius:4px;backdrop-filter:blur(6px);box-shadow:0 0 10px rgba(0,255,136,0.1);font-size:0.75rem}
.stat{display:flex;align-items:center;gap:8px;margin-top:6px}
.bar{flex:1;height:6px;background:#111;border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--hud);transition:width .3s,background .3s}
#log{position:fixed;bottom:60px;left:16px;width:min(300px,70vw);max-height:80px;overflow-y:auto;font-size:0.65rem;opacity:.8;z-index:10;scrollbar-width:none}
#log div{padding:2px 0;border-bottom:1px dashed #2a3}
#controls{position:fixed;bottom:16px;right:16px;display:flex;gap:8px;z-index:20}
button{background:transparent;border:1px solid var(--hud);color:var(--hud);padding:8px 12px;cursor:pointer;font-family:inherit;text-transform:uppercase;font-size:0.7rem;transition:all .15s;border-radius:3px}
button:hover{background:var(--hud);color:#000}button:active{transform:scale(0.95)}
</style>
</head>
<body>
<div class="grid"></div><div class="scanline"></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="panel">
    <div>AGENTE: <span id="name">K-9 PIXEL</span> | NIVEL: <span id="lvl">1</span></div>
    <div class="stat">HAMBRE<div class="bar"><div id="hunger" class="fill"></div></div></div>
    <div class="stat">ENERGÍA<div class="bar"><div id="energy" class="fill"></div></div></div>
    <div class="stat">MORAL<div class="bar"><div id="mood" class="fill"></div></div></div>
  </div>
  <div class="panel">XP: <span id="xp">0</span>/<span id="xpmax">100</span></div>
</div>
<div id="log"></div>
<div id="controls">
  <button onclick="app.feed()">🍖 ALIMENTAR</button>
  <button onclick="app.scratch()">✋ RASCAR</button>
  <button onclick="app.play()">🎾 JUGAR</button>
</div>

<script>
const app={
  cv:null,ctx:null,
  wolf:{x:0,y:0,vx:0,vy:0,dir:1,state:'IDLE',frame:0,frameT:0,targetX:0,targetY:0},
  food:{active:false,x:0,y:0,timer:0},
  stats:{hunger:70,energy:80,mood:65,xp:0,level:1,maxXp:100},
  particles:[],
  P:{D:'#2d2d2d',M:'#6b6b6b',W:'#e0e0e0',B:'#111',P:'#d99a9a',N:'#5a4a3a'},
  sprites:{},
  log(m){const d=document.createElement('div');d.textContent=`> ${new Date().toLocaleTimeString()} | ${m}`;document.getElementById('log').prepend(d);if(document.getElementById('log').children.length>12)document.getElementById('log').lastChild.remove()},
  buildSprites(){
    const draw=(c,rows)=>{const cv=document.createElement('canvas');cv.width=24;cv.height=rows.length;c.imageSmoothingEnabled=false;c.fillStyle='transparent';c.fillRect(0,0,24,rows.length);rows.forEach((r,y)=>{for(let x=0;x<r.length;x++){if(this.P[r[x]]){c.fillStyle=this.P[r[x]];c.fillRect(x,y,1,1)}}});return cv};
    this.sprites.IDLE=[
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "]),
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "])
    ];
    this.sprites.WALK=[
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "]),
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "])
    ];
    this.sprites.EAT=[
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "]),
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "])
    ];
    this.sprites.SCRATCH=[
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "]),
      draw(this.ctx,["      DDDD      ","     DW  WD     ","    DWM  MWD    ","   DWMMBBMMWD   ","   DWMWDDWMWD   ","   DWWM  WMWD   ","   DWWM  WMWD   ","   DWMMMMMMWD   ","   DWDDDDDDWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWW    WWD   ","   DWWWWWWWWWD  ","    DD  DD DD  ","   DDM  DM DM  ","   DD    D D   ","      DDDD     "])
    ];
    this.sprites.CHASE=this.sprites.WALK;
  },
  updateUI(){
    ['hunger','energy','mood'].forEach(k=>{
      const el=document.getElementById(k),v=this.stats[k];
      el.style.width=v+'%';el.style.background=v<20?'var(--alert)':v<40?'var(--warn)':'var(--hud)';
    });
    document.getElementById('xp').textContent=Math.floor(this.stats.xp);
    document.getElementById('xpmax').textContent=this.stats.maxXp;
    document.getElementById('lvl').textContent=this.stats.level;
  },
  addXp(n){this.stats.xp+=n;if(this.stats.xp>=this.stats.maxXp){this.stats.level++;this.stats.xp=0;this.stats.maxXp=Math.floor(this.stats.maxXp*1.3);this.log(`ASCENSO A NIVEL ${this.stats.level}. RECOMPENSAS ACTIVADAS.`);this.spawn(this.wolf.x,this.wolf.y-20,12,'#ffaa00');this.stats.hunger=Math.min(100,this.stats.hunger+20);this.stats.energy=Math.min(100,this.stats.energy+20);this.stats.mood=Math.min(100,this.stats.mood+20)}this.updateUI()},
  spawn(x,y,n,col){for(let i=0;i<n;i++){this.particles.push({x,y,vx:(Math.random()-.5)*2.5,vy:-Math.random()*2-.5,life:1,decay:.03+Math.random()*.02,size:2+Math.random()*2,col})}},
  setSt(s){this.wolf.state=s;this.wolf.frame=0;this.wolf.frameT=0},
  feed(){if(this.wolf.state==='EAT'||this.wolf.state==='SCRATCH')return;this.food={active:true,x:Math.max(40,Math.min(this.cv.width-40,this.wolf.x+(Math.random()-.5)*200)),y:Math.max(40,Math.min(this.cv.height-40,this.wolf.y+(Math.random()>.5?60:-40))),timer:300};this.setSt('EAT');this.log('RACIÓN DESPLEGADA. OBJETIVO FIJADO.');},
  scratch(){if(this.wolf.state==='EAT'||this.wolf.state==='SCRATCH')return;this.setSt('SCRATCH');this.log('MANTENIMIENTO TÁCTICO. MORAL +25, XP +10.');this.stats.mood=Math.min(100,this.stats.mood+25);this.addXp(10);this.spawn(this.wolf.x,this.wolf.y-15,6,'#00ffaa');setTimeout(()=>{if(this.wolf.state==='SCRATCH')this.setSt('IDLE')},1800)},
  play(){if(this.stats.energy<15){this.log('ENERGÍA CRÍTICA. OPERACIÓN DENEGADA.');return}this.setSt('CHASE');this.log('PERSECUCIÓN ACTIVA. ENERGÍA -20, XP +20.');this.stats.energy=Math.max(0,this.stats.energy-20);this.stats.mood=Math.min(100,this.stats.mood+15);this.addXp(20);setTimeout(()=>{if(this.wolf.state==='CHASE')this.setSt('IDLE')},3000)},
  draw(){
    this.ctx.clearRect(0,0,this.cv.width,this.cv.height);
    this.ctx.fillStyle='rgba(0,255,136,0.06)';this.ctx.beginPath();this.ctx.ellipse(this.wolf.x,this.wolf.y+20,18,5,0,0,Math.PI*2);this.ctx.fill();
    const S=this.sprites[this.wolf.state]||this.sprites.IDLE;
    const idx=this.wolf.frame%S.length;
    const sp=S[idx];
    const scale=6;
    this.ctx.save();
    this.ctx.translate(this.wolf.x,this.wolf.y);
    this.ctx.scale(this.wolf.dir*scale,scale);
    this.ctx.drawImage(sp,-12,-17,24,18);
    this.ctx.restore();
    if(this.food.active){
      this.ctx.fillStyle='#5a4a3a';this.ctx.fillRect(this.food.x-4,this.food.y-4,8,8);
      this.ctx.fillStyle='#d99a9a';this.ctx.fillRect(this.food.x-2,this.food.y-2,4,4);
      if(--this.food.timer<=0)this.food.active=false;
    }
    this.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.decay;this.ctx.globalAlpha=Math.max(0,p.life);this.ctx.fillStyle=p.col;this.ctx.fillRect(p.x,p.y,p.size,p.size)});
    this.ctx.globalAlpha=1;
  },
  loop(){
    const w=this.wolf;
    this.stats.hunger=Math.max(0,this.stats.hunger-0.07);this.stats.energy=Math.max(0,this.stats.energy-0.04);this.stats.mood=Math.max(0,this.stats.mood-0.03);this.updateUI();
    w.frameT++;if(w.frameT%15===0)w.frame++;
    let tx=w.x,ty=w.y,speed=1.5;
    if(w.state==='EAT'&&this.food.active){tx=this.food.x;ty=this.food.y;speed=2;if(Math.hypot(w.x-tx,w.y-ty)<5){this.log('RACIÓN CONSUMIDA. HAMBRE +30, XP +15.');this.stats.hunger=Math.min(100,this.stats.hunger+30);this.stats.energy=Math.min(100,this.stats.energy+10);this.addXp(15);this.spawn(w.x,w.y-10,8,'#ffaa00');this.food.active=false;this.setSt('IDLE')}}
    else if(w.state==='CHASE'){tx=app.mx;ty=app.my;speed=2.8}
    else if(w.state==='IDLE'){if(w.frameT%200===0){w.targetX=Math.max(30,Math.min(this.cv.width-30,w.x+(Math.random()-.5)*250));w.targetY=Math.max(30,Math.min(this.cv.height-30,w.y+(Math.random()-.5)*200));this.setSt('WANDER')}}
    else if(w.state==='WANDER'){tx=w.targetX;ty=w.targetY;speed=1;if(Math.hypot(w.x-tx,w.y-ty)<5)this.setSt('IDLE')}
    
    if(tx!==w.x||ty!==w.y){w.x+=(tx-w.x)*0.09;w.y+=(ty-w.y)*0.09;if(tx>w.x+1)w.dir=1;else if(tx<w.x-1)w.dir=-1}
    w.x=Math.max(20,Math.min(this.cv.width-20,w.x));w.y=Math.max(40,Math.min(this.cv.height-25,w.y));
    this.draw();requestAnimationFrame(()=>this.loop());
  },
  init(){
    this.cv=document.getElementById('c');this.ctx=this.cv.getContext('2d');
    this.ctx.imageSmoothingEnabled=false;
    const resize=()=>{this.cv.width=innerWidth;this.cv.height=innerHeight};
    resize();window.addEventListener('resize',resize);
    this.wolf.x=innerWidth/2;this.wolf.y=innerHeight/2;
    this.mx=innerWidth/2;this.my=innerHeight/2;
    document.addEventListener('mousemove',e=>{this.mx=e.clientX;this.my=e.clientY});
    document.addEventListener('touchmove',e=>{this.mx=e.touches[0].clientX;this.my=e.touches[0].clientY},{passive:true});
    this.buildSprites();this.log('SISTEMA INICIADO. ACTIVO ESCUCHAR.');this.log('PROTOCOLO: INTERACTÚA PARA PROGRESAR.');this.loop();
  }
};
app.init();
</script>
</body>
</html>

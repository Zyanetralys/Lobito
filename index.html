<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobito Operativo</title>
<style>
:root{--speed:0.06;--wolf-size:4rem}
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;overflow:hidden;background:#0b0f14;font-family:system-ui;color:#8b9a7d;display:flex;flex-direction:column;align-items:center;justify-content:center}
#wolf{position:absolute;font-size:var(--wolf-size);transform:translate(-50%,-50%);transition:filter .2s;cursor:pointer;user-select:none;z-index:10}
#wolf.scratch{animation:scratch .6s infinite}
#wolf.eat{animation:eat .8s forwards}
#wolf.play{animation:play 1.2s infinite}
@keyframes scratch{0%,100%{transform:translate(-50%,-50%) rotate(0)}25%{transform:translate(-50%,-50%) rotate(-15deg) scaleX(-1)}50%{transform:translate(-50%,-50%) rotate(0)}75%{transform:translate(-50%,-50%) rotate(15deg)}}
@keyframes eat{0%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes play{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-30px)}}
#food{position:absolute;font-size:2.5rem;transform:translate(-50%,-50%);pointer-events:none;z-index:5}
#ui{position:fixed;bottom:20px;display:flex;gap:10px;z-index:20}
button{background:#1a2320;border:1px solid #3a4a35;color:#8b9a7d;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.85rem}
button:hover{background:#25332b}
#status{position:fixed;top:15px;left:20px;font-size:.8rem;opacity:.7}
</style>
</head>
<body>
<div id="status">Estado: IDLE | Hambre: <span id="hungerVal">50</span>%</div>
<div id="wolf">🐺</div>
<div id="food">🍖</div>
<div id="ui">
  <button onclick="trigger('feed')">Alimentar</button>
  <button onclick="trigger('scratch')">Rascar</button>
  <button onclick="trigger('play')">Jugar</button>
</div>

<script>
const wolf=document.getElementById('wolf'),food=document.getElementById('food'),hVal=document.getElementById('hungerVal'),status=document.getElementById('status');
let wx=innerWidth/2,wy=innerHeight/2,mx=wx,my=wy,state='idle',hunger=50,foodX,foodY,animFrame;
const set=(s)=>{state=s;wolf.className=s==='idle'?'':s;status.textContent=`Estado: ${s.toUpperCase()} | Hambre: ${hunger}%`};
const lerp=(a,b,t)=>a+(b-a)*t;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
const spawnFood=()=>{foodX=80+Math.random()*(innerWidth-160);foodY=80+Math.random()*(innerHeight-160);food.style.left=foodX+'px';food.style.top=foodY+'px';food.style.display='block'};
const eatFood=()=>{food.style.display='none';hunger=Math.min(100,hunger+30);hVal.textContent=hunger;set('idle')};
window.trigger=(action)=>{
  if(action==='feed'){if(hunger<80){spawnFood();set('eat');setTimeout(eatFood,1500)}else status.textContent='Hambre baja. Espera.'}
  if(action==='scratch'){set('scratch');setTimeout(()=>set('idle'),2000)}
  if(action==='play'){set('play');setTimeout(()=>set('idle'),2500)}
};
const loop=()=>{
  hunger=Math.max(0,hunger-0.05);hVal.textContent=Math.round(hunger);
  let tx=state==='idle'||state==='play'?mx:state==='eat'?foodX:wx;
  let ty=state==='idle'||state==='play'?my:state==='eat'?foodY:wy;
  wx=lerp(wx,tx,0.06);wy=lerp(wy,ty,0.06);
  wolf.style.left=wx+'px';wolf.style.top=wy+'px';
  wolf.style.transform=`translate(-50%,-50%) scaleX(${mx>wx?-1:1})`;
  animFrame=requestAnimationFrame(loop);
};
loop();
</script>
</body>
</html>

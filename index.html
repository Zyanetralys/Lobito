<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-9 PIXEL ASSET // ZYANETRALYS</title>
<style>
:root{--hud:#00ff88;--warn:#ffaa00;--alert:#ff3344;--bg:#05080a;--panel:rgba(0,15,8,0.85)}
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
body{background:var(--bg);color:var(--hud);font-family:'Courier New',monospace;overflow:hidden;height:100vh}
.grid{position:fixed;inset:0;background:linear-gradient(rgba(0,255,136,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
.scanline{position:fixed;inset:0;background:linear-gradient(180deg,transparent 95%,rgba(0,255,136,0.02) 100%);pointer-events:none;animation:scan 10s linear infinite;z-index:1}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;position:fixed;z-index:5}
#ui{position:fixed;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;pointer-events:none}
.panel{background:var(--panel);border:1px solid var(--hud);padding:10px 14px;border-radius:4px;backdrop-filter:blur(6px);box-shadow:0 0 12px rgba(0,255,136,0.15);font-size:0.75rem}
.stat{display:flex;align-items:center;gap:8px;margin-top:6px}
.bar{flex:1;height:5px;background:#111;border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--hud);transition:width .3s,background .3s}
#log{position:fixed;bottom:70px;left:16px;width:min(320px,75vw);max-height:90px;overflow-y:auto;font-size:0.7rem;opacity:.85;z-index:10;scrollbar-width:none}
#log div{padding:3px 0;border-bottom:1px dashed #2a3}
#controls{position:fixed;bottom:16px;right:16px;display:flex;gap:8px;z-index:30}
button{background:transparent;border:1px solid var(--hud);color:var(--hud);padding:8px 12px;cursor:pointer;font-family:inherit;text-transform:uppercase;font-size:0.7rem;transition:all .15s;border-radius:3px}
button:hover{background:var(--hud);color:#000}button:active{transform:scale(0.95)}button:disabled{opacity:.3;cursor:not-allowed}
.particle{position:fixed;pointer-events:none;z-index:4;border-radius:50%}
</style>
</head>
<body>
<div class="grid"></div><div class="scanline"></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="panel">
    <div>AGENTE: <span id="name">K-9 PIXEL</span> | NIVEL: <span id="lvl">1</span></div>
    <div class="stat">HAMBRE<div class="bar"><div id="hunger" class="fill"></div></div></div>
    <div class="stat">ENERGÍA<div class="bar"><div id="energy" class="fill"></div></div></div>
    <div class="stat">MORAL<div class="bar"><div id="mood" class="fill"></div></div></div>
  </div>
  <div class="panel">XP: <span id="xp">0</span>/<span id="xpmax">100</span></div>
</div>
<div id="log"></div>
<div id="controls">
  <button onclick="app.feed()">🍖 ALIMENTAR</button>
  <button onclick="app.scratch()">✋ RASCAR</button>
  <button onclick="app.play()">🎾 JUGAR</button>
</div>

<script>
const app={
  cv:null,ctx:null,
  wolf:{x:0,y:0,vx:0,vy:0,state:'IDLE',dir:1,frame:0,timer:0,foodTarget:null},
  stats:{hunger:70,energy:80,mood:65,xp:0,level:1,maxXp:100},
  particles:[],
  keys:{1:'#3a3a3a',2:'#8a8a8a',3:'#c8c8c8',4:'#111111',5:'#d99a9a',6:'#5a4a3a'},
  frames:{
    idle:[
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","  1  1  ","   11   "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","  1  1  ","   11   "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","  1111  ","   11   "]
    ],
    walk:[
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 "," 1    1  ","  111   "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 "," 1   1  ","  11    "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 "," 11      ","  11    "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","   1     ","   11   "]
    ],
    eat:[
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","  1111  ","   11   "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 "," 111111 ","  111   "]
    ],
    scratch:[
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","  111   ","   1    "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 ","  111   ","   1    "],
      ["  11    "," 1111   ","11  11  ","1    11 ","1    11 ","1    11 "," 11111  "," 1    1 "," 1 55 1 "," 1    1 "," 1111    ","  1     "]
    ]
  },
  sprites:{},
  log(m){const d=document.createElement('div');d.textContent=`> ${new Date().toLocaleTimeString()} | ${m}`;document.getElementById('log').prepend(d);if(document.getElementById('log').children.length>12)document.getElementById('log').lastChild.remove()},
  initSprites(){
    Object.keys(this.frames).forEach(k=>{
      this.sprites[k]=[];
      this.frames[k].forEach(f=>{
        const cv=document.createElement('canvas');
        cv.width=8;cv.height=f.length;
        const c=cv.getContext('2d');
        f.forEach((row,y)=>{
          for(let x=0;x<row.length;x++){
            if(row[x]!==' ' && this.keys[row[x]]){
              c.fillStyle=this.keys[row[x]];
              c.fillRect(x,y,1,1);
            }
          }
        });
        this.sprites[k].push(cv);
      });
    });
  },
  updateBars(){
    ['hunger','energy','mood'].forEach(k=>{
      const el=document.getElementById(k),v=this.stats[k];
      el.style.width=v+'%';el.style.background=v<20?'var(--alert)':v<40?'var(--warn)':'var(--hud)';
    });
    document.getElementById('xp').textContent=Math.floor(this.stats.xp);
    document.getElementById('xpmax').textContent=this.stats.maxXp;
    document.getElementById('lvl').textContent=this.stats.level;
  },
  addXp(a){this.stats.xp+=a;if(this.stats.xp>=this.stats.maxXp){this.stats.level++;this.stats.xp=0;this.stats.maxXp=Math.floor(this.stats.maxXp*1.4);this.log(`ASCENSO A NIVEL ${this.stats.level}. SINCRONIZACIÓN COMPLETA.`);this.spawn(this.wolf.x,this.wolf.y-20,15,'#ffaa00');this.stats.hunger=Math.min(100,this.stats.hunger+25);this.stats.energy=Math.min(100,this.stats.energy+25);this.stats.mood=Math.min(100,this.stats.mood+25)}this.updateBars()},
  spawn(x,y,c,col){for(let i=0;i<c;i++){const p=document.createElement('div');p.className='particle';const s=2+Math.random()*3;p.style.cssText=`left:${x}px;top:${y}px;width:${s}px;height:${s}px;background:${col};opacity:1;transform:translate(-50%,-50%)`;document.body.appendChild(p);this.particles.push({el:p,x,y,vx:(Math.random()-.5)*2.5,vy:-Math.random()*2-.3,life:1,decay:.03+Math.random()*.02})}},
  updPart(){for(let i=this.particles.length-1;i>=0;i--){const p=this.particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';p.el.style.opacity=p.life;if(p.life<=0){p.el.remove();this.particles.splice(i,1)}}},
  setSt(s){this.wolf.state=s;this.wolf.timer=0;this.wolf.frame=0},
  feed(){if(this.wolf.state!=='IDLE'&&this.wolf.state!=='WANDER')return;this.wolf.foodTarget={x:this.wolf.x+(Math.random()-.5)*100,y:this.wolf.y+60};this.setSt('EAT');this.log('RACIÓN DESPLEGADA. OBJETIVO MARCADO.');},
  scratch(){if(this.wolf.state!=='IDLE'&&this.wolf.state!=='WANDER')return;this.setSt('SCRATCH');this.log('MANTENIMIENTO TÁCTICO. MORAL +25.');this.stats.mood=Math.min(100,this.stats.mood+25);this.addXp(10);this.spawn(this.wolf.x,this.wolf.y-15,8,'#00ffaa');},
  play(){if(this.stats.energy<15){this.log('ENERGÍA CRÍTICA. RECHAZADO.');return}this.setSt('CHASE');this.log('PROTOCOLO PERSECUCIÓN ACTIVO. ENERGÍA -20, XP +20.');this.stats.energy=Math.max(0,this.stats.energy-20);this.stats.mood=Math.min(100,this.stats.mood+15);this.addXp(20);},
  draw(){
    this.ctx.clearRect(0,0,this.cv.width,this.cv.height);
    // Shadow
    this.ctx.fillStyle='rgba(0,255,136,0.08)';
    this.ctx.beginPath();this.ctx.ellipse(this.wolf.x,this.wolf.y+12,14,4,0,0,Math.PI*2);this.ctx.fill();
    // Sprite
    const s=this.sprites[this.wolf.state]||this.sprites.idle;
    const idx=Math.floor(this.wolf.timer)%s.length;
    const sp=s[idx];
    const scale=5;
    this.ctx.save();
    this.ctx.translate(this.wolf.x,this.wolf.y-12);
    this.ctx.scale(this.wolf.dir*scale,scale);
    this.ctx.drawImage(sp,0,0,sp.width,sp.height,-sp.width/2,0,sp.width,sp.height);
    this.ctx.restore();
  },
  loop(){
    this.cv.width=innerWidth;this.cv.height=innerHeight;
    // Stats decay
    this.stats.hunger=Math.max(0,this.stats.hunger-0.08);
    this.stats.energy=Math.max(0,this.stats.energy-0.05);
    this.stats.mood=Math.max(0,this.stats.mood-0.04);
    this.updateBars();
    
    // AI
    const w=this.wolf;
    w.timer++;
    let tx=w.x,ty=w.y,speed=1.2;
    if(w.state==='EAT'&&w.foodTarget){
      tx=w.foodTarget.x;ty=w.foodTarget.y;speed=1.5;
      if(Math.abs(w.x-w.foodTarget.x)<3&&Math.abs(w.y-w.foodTarget.y)<3){
        this.log('RACIÓN CONSUMIDA. HAMBRE +30, XP +15.');
        this.stats.hunger=Math.min(100,this.stats.hunger+30);this.stats.energy=Math.min(100,this.stats.energy+12);
        this.addXp(15);this.spawn(w.x,w.y-10,10,'#ffaa00');w.foodTarget=null;this.setSt('IDLE');
      }
    }else if(w.state==='CHASE'){
      tx=app.mx;ty=app.my;speed=2.5;
      if(w.timer>250)this.setSt('IDLE');
    }else if(w.state==='IDLE'||w.state==='WANDER'){
      if(w.timer>150+Math.random()*200){
        w.targetX=w.x+(Math.random()-.5)*200;
        w.targetY=w.y+(Math.random()-.5)*150;
        this.setSt('WANDER');
      }
      if(w.state==='WANDER'){
        tx=w.targetX;ty=w.targetY;speed=0.8;
        if(Math.abs(w.x-w.targetX)<2&&Math.abs(w.y-w.targetY)<2)this.setSt('IDLE');
      }
      if(w.stats.hunger<30&&!w.foodTarget){w.targetX=w.x+(Math.random()>.5?50:-50);w.targetY=w.y+40;this.setSt('WANDER');}
    }
    
    // Movement
    w.x+=(tx-w.x)*0.08;w.y+=(ty-w.y)*0.08;
    if(tx>w.x+1)w.dir=1;else if(tx<w.x-1)w.dir=-1;
    w.y=Math.max(60,Math.min(w.y,this.cv.height-40));
    w.x=Math.max(20,Math.min(w.x,this.cv.width-20));
    
    this.draw();
    this.updPart();
    requestAnimationFrame(()=>this.loop());
  },
  init(){
    this.cv=document.getElementById('c');this.ctx=this.cv.getContext('2d');
    this.ctx.imageSmoothingEnabled=false;
    this.wolf.x=innerWidth/2;this.wolf.y=innerHeight/2;
    this.mx=innerWidth/2;this.my=innerHeight/2;
    document.addEventListener('mousemove',e=>{this.mx=e.clientX;this.my=e.clientY});
    document.addEventListener('touchmove',e=>{this.mx=e.touches[0].clientX;this.my=e.touches[0].clientY},{passive:true});
    this.initSprites();this.log('SISTEMA INICIADO. ACTIVO ESCUCHAR.');this.log('PROTOCOLO: INTERACTÚA PARA PROGRESAR.');this.loop();
  }
};
app.init();
</script>
</body>
</html>
